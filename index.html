<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture-Controlled 3D Website</title>
    
    <!-- CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; background-color: #050505; color: #fff; overflow: hidden; font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(10, 10, 15, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15), inset 0 0 10px rgba(255, 0, 255, 0.1);
            border-radius: 16px;
        }
        #webgl-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        .video-container { position: relative; width: 100%; border-radius: 8px; overflow: hidden; border: 1px solid rgba(0, 255, 255, 0.5); aspect-ratio: 4/3; }
        .video-feed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .canvas-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; transform: scaleX(-1); }
        
        .loading-screen { position: absolute; top:0; left:0; width: 100%; height: 100%; background: #050505; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid rgba(0, 255, 255, 0.1); border-left-color: #ff00ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;}
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // --- CONSTANTS ---
        const GESTURES = { NONE: "None", OPEN_PALM: "Open Palm", FIST: "Fist", THUMBS_UP: "Thumbs Up", PEACE: "Peace Sign", POINTING: "Drawing", HEART: "Heart" };

        const detectGesture = (multiHandLandmarks) => {
            if (!multiHandLandmarks || multiHandLandmarks.length === 0) return GESTURES.NONE;

            const distance = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y, p1.z - p2.z);
            const isExtended = (lm, tip, pip) => distance(lm[tip], lm[0]) > distance(lm[pip], lm[0]);
            
            // HEART gesture (2 hands)
            if (multiHandLandmarks.length >= 2) {
                const h1 = multiHandLandmarks[0];
                const h2 = multiHandLandmarks[1];
                
                const thumbDist = distance(h1[4], h2[4]);
                const indexDist = distance(h1[8], h2[8]);
                const indexPipDist = distance(h1[6], h2[6]);
                
                // Thumbs touching at bottom, index tips touching at top, creating an arch
                if (thumbDist < 0.15 && indexDist < 0.15 && indexPipDist > indexDist) {
                    return GESTURES.HEART;
                }
            }
            
            // Default to primary hand gesture logic
            const lm = multiHandLandmarks[0];
            const indexExt = isExtended(lm, 8, 6);
            const middleExt = isExtended(lm, 12, 10);
            const ringExt = isExtended(lm, 16, 14);
            const pinkyExt = isExtended(lm, 20, 18);
            
            const isThumbUp = lm[4].y < lm[5].y && lm[4].y < lm[9].y && !indexExt && !middleExt && !ringExt && !pinkyExt && lm[4].y < lm[3].y;

            if (isThumbUp) return GESTURES.THUMBS_UP;
            if (indexExt && middleExt && !ringExt && !pinkyExt) return GESTURES.PEACE;
            if (indexExt && !middleExt && !ringExt && !pinkyExt) return GESTURES.POINTING;
            if (indexExt && middleExt && ringExt && pinkyExt) return GESTURES.OPEN_PALM;
            if (!indexExt && !middleExt && !ringExt && !pinkyExt && !isThumbUp) return GESTURES.FIST;

            return GESTURES.NONE;
        };

        const App = () => {
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            
            const rendererRef = useRef(null);
            const sceneRef = useRef(null);
            const cameraRef = useRef(null);
            const objectsRef = useRef([]);
            const particlesRef = useRef(null);
            const bgGroupRef = useRef(null);
            
            const targetsRef = useRef({
                positions: [
                    new THREE.Vector3(-3, 0, 0),
                    new THREE.Vector3(0, 0, 0),
                    new THREE.Vector3(3, 0, 0)
                ],
                scale: 1.0,
                handPos: new THREE.Vector3(0,0,0)
            });
            
            const gestureStateRef = useRef(GESTURES.NONE);
            const lastValidGestureRef = useRef(GESTURES.NONE);
            
            const [localGesture, setLocalGesture] = useState(GESTURES.NONE);
            const [handsCount, setHandsCount] = useState(0);
            const [metrics, setMetrics] = useState({ fps: 0 });
            const [loading, setLoading] = useState(true);

            const framesRef = useRef(0);
            const lastTimeRef = useRef(performance.now());
            const reqAnimFrameRef = useRef(null);

            useEffect(() => {
                // Initialize Three.js
                const scene = new THREE.Scene();
                
                // Enhanced Background: Rotating grid & stardust
                const bgGroup = new THREE.Group();
                const starsGeo = new THREE.BufferGeometry();
                const starsArray = new Float32Array(3000 * 3);
                for(let i=0; i<9000; i++) {
                    starsArray[i] = (Math.random() - 0.5) * 40;
                }
                starsGeo.setAttribute('position', new THREE.BufferAttribute(starsArray, 3));
                const starsMat = new THREE.PointsMaterial({color: 0x88ccff, size: 0.05, transparent: true, opacity: 0.6});
                const starsMesh = new THREE.Points(starsGeo, starsMat);
                
                const gridColor = new THREE.Color(0xff00ff);
                gridColor.lerp(new THREE.Color(0x00ffff), 0.5);
                const gridHelper = new THREE.GridHelper(40, 40, gridColor, gridColor);
                gridHelper.position.y = -3;
                gridHelper.material.transparent = true;
                gridHelper.material.opacity = 0.15;
                
                bgGroup.add(starsMesh);
                bgGroup.add(gridHelper);
                scene.add(bgGroup);
                bgGroupRef.current = bgGroup;

                // Road
                const roadGeo = new THREE.PlaneGeometry(8, 40);
                const roadMat = new THREE.MeshStandardMaterial({color: 0x111111, roughness: 0.8});
                const road = new THREE.Mesh(roadGeo, roadMat);
                road.rotation.x = -Math.PI / 2;
                road.position.y = -2.99; // Just above grid
                bgGroup.add(road);
                
                // Center Line
                const lineGeo = new THREE.PlaneGeometry(0.2, 40);
                const lineMat = new THREE.MeshBasicMaterial({color: 0xffff00});
                const line = new THREE.Mesh(lineGeo, lineMat);
                line.rotation.x = -Math.PI / 2;
                line.position.y = -2.98;
                bgGroup.add(line);

                const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 8;
                camera.position.y = 2;
                camera.lookAt(0,0,0);
                cameraRef.current = camera;
                
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, powerPreference: "high-performance" });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                document.getElementById('webgl-container').appendChild(renderer.domElement);
                rendererRef.current = renderer;
                
                scene.add(new THREE.AmbientLight(0xffffff, 0.3));
                
                const cyanLight = new THREE.PointLight(0x00ffff, 2, 20);
                cyanLight.position.set(-4, 4, 4);
                scene.add(cyanLight);
                
                const magentaLight = new THREE.PointLight(0xff00ff, 2, 20);
                magentaLight.position.set(4, 4, -4);
                scene.add(magentaLight);
                
                // Build Ultra-Detailed Procedural Sports Car (Mercedes Style)
                const carGroup = new THREE.Group();
                
                // Materials
                const bodyMat = new THREE.MeshPhysicalMaterial({ color: 0xcccccc, metalness: 0.9, roughness: 0.2, clearcoat: 1.0, clearcoatRoughness: 0.1 }); // Silver
                const trimMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.5 }); // Black plastic/trim
                const windowMat = new THREE.MeshPhysicalMaterial({ color: 0x050505, metalness: 0.8, roughness: 0.05, transmission: 0.5, transparent: true }); // Tinted glass
                const tireMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9, metalness: 0.1 });
                const rimMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, metalness: 0.9, roughness: 0.2 });
                const headlightMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const taillightMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                const grillMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, metalness: 0.9, roughness: 0.4, wireframe: true });

                // Main Chassis
                const chassisGeo = new THREE.BoxGeometry(2.1, 0.45, 4.8);
                const chassis = new THREE.Mesh(chassisGeo, bodyMat);
                chassis.position.y = 0.5;
                
                // Front Hood Slope
                const hoodGeo = new THREE.CylinderGeometry(1.05, 1.05, 4.8, 32, 1, false, 0, Math.PI / 2);
                const hood = new THREE.Mesh(hoodGeo, bodyMat);
                hood.rotation.z = Math.PI / 2;
                hood.scale.set(0.15, 1, 1);
                hood.position.y = 0.725;

                // Cabin / Windows (Sleek bubble)
                const cabinGeo = new THREE.BoxGeometry(1.6, 0.55, 2.2);
                const cabin = new THREE.Mesh(cabinGeo, windowMat);
                cabin.position.set(0, 0.95, -0.2);
                
                // Grille
                const grill = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.25, 0.1), grillMat);
                grill.position.set(0, 0.55, 2.41);
                
                // Mercedes-style Star badge on Grille
                const badge = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.02, 8, 24), rimMat);
                badge.position.set(0, 0.55, 2.45);
                badge.rotation.y = Math.PI / 2;
                
                // Rear Bumper / Diffuser
                const diffuser = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.15, 0.2), trimMat);
                diffuser.position.set(0, 0.35, -2.4);
                
                // Spoiler
                const spoilerWing = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.05, 0.4), bodyMat);
                spoilerWing.position.set(0, 0.9, -2.2);
                const spoilerL = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.2, 0.2), trimMat);
                spoilerL.position.set(-0.7, 0.8, -2.2);
                const spoilerR = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.2, 0.2), trimMat);
                spoilerR.position.set(0.7, 0.8, -2.2);

                // LED Headlights
                const hlL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.05), headlightMat);
                hlL.position.set(-0.7, 0.6, 2.41);
                hlL.rotation.y = -0.1;
                const hlR = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.05), headlightMat);
                hlR.position.set(0.7, 0.6, 2.41);
                hlR.rotation.y = 0.1;

                // Taillights
                const tlL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.05), taillightMat);
                tlL.position.set(-0.7, 0.65, -2.41);
                const tlR = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.05), taillightMat);
                tlR.position.set(0.7, 0.65, -2.41);

                // Spotlights (Casting real light beams forward)
                const spotLight = new THREE.SpotLight(0xffffff, 4);
                spotLight.position.set(0, 0.6, 2.1);
                spotLight.angle = Math.PI / 4;
                spotLight.penumbra = 0.2;
                spotLight.distance = 40;
                spotLight.target.position.set(0, 0.6, 20);
                
                // Assemble Car Body
                carGroup.add(chassis, hood, cabin, grill, badge, diffuser, spoilerWing, spoilerL, spoilerR, hlL, hlR, tlL, tlR, spotLight, spotLight.target);
                
                // Detailed Wheels with Rims
                const wheels = [];
                const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.25, 32);
                wheelGeo.rotateZ(Math.PI / 2);
                const rimGeo = new THREE.CylinderGeometry(0.22, 0.22, 0.26, 16);
                rimGeo.rotateZ(Math.PI / 2);
                const rimSpokeGeo = new THREE.BoxGeometry(0.27, 0.4, 0.05);

                const wheelPositions = [
                    [-1.1, 0.35, 1.4], [1.1, 0.35, 1.4],    // Front left, Front right
                    [-1.1, 0.35, -1.4], [1.1, 0.35, -1.4]   // Rear left, Rear right
                ];

                wheelPositions.forEach(pos => {
                    const wheelGroup = new THREE.Group();
                    const tire = new THREE.Mesh(wheelGeo, tireMat);
                    const rim = new THREE.Mesh(rimGeo, rimMat);
                    
                    // Spokes
                    const spoke1 = new THREE.Mesh(rimSpokeGeo, trimMat);
                    spoke1.rotation.y = Math.PI/2;
                    const spoke2 = new THREE.Mesh(rimSpokeGeo, trimMat);
                    spoke2.rotation.y = Math.PI/2;
                    spoke2.rotation.x = Math.PI/2;
                    
                    wheelGroup.add(tire, rim, spoke1, spoke2);
                    wheelGroup.position.set(...pos);
                    wheels.push(wheelGroup);
                    carGroup.add(wheelGroup);
                });

                // Scale car uniformly
                carGroup.scale.set(0.6, 0.6, 0.6);
                // Rotate to face forward initially
                carGroup.rotation.y = Math.PI;

                scene.add(carGroup);
                
                objectsRef.current = [carGroup];
                objectsRef.current.wheels = wheels;
                sceneRef.current = scene;

                // Particle System
                const maxParticles = 6000;
                const pGeo = new THREE.BufferGeometry();
                const pPos = new Float32Array(maxParticles * 3);
                const pCol = new Float32Array(maxParticles * 3);
                
                pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3).setUsage(THREE.DynamicDrawUsage));
                pGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3).setUsage(THREE.DynamicDrawUsage));
                
                const pMat = new THREE.PointsMaterial({
                    size: 0.12,
                    vertexColors: true,
                    transparent: true,
                    opacity: 1.0,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });
                
                const pMesh = new THREE.Points(pGeo, pMat);
                scene.add(pMesh);
                
                particlesRef.current = {
                    maxParticles, count: 0, positions: pPos, velocities: new Float32Array(maxParticles * 3),
                    lifespans: new Float32Array(maxParticles), colors: pCol, mesh: pMesh
                };
                
                const triggerExplosion = (x, y, z) => {
                    const p = particlesRef.current;
                    const explosionCount = 250;
                    for(let i = 0; i < explosionCount; i++) {
                        if (p.count >= p.maxParticles) break;
                        const idx = p.count * 3;
                        p.positions[idx] = x + (Math.random()-0.5)*0.5;
                        p.positions[idx+1] = y + (Math.random()-0.5)*0.5;
                        p.positions[idx+2] = z + (Math.random()-0.5)*0.5;
                        
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos((Math.random() * 2) - 1);
                        const speed = Math.random() * 0.15 + 0.05;
                        
                        p.velocities[idx] = speed * Math.sin(phi) * Math.cos(theta);
                        p.velocities[idx+1] = speed * Math.sin(phi) * Math.sin(theta);
                        p.velocities[idx+2] = speed * Math.cos(phi);
                        
                        const isMagenta = Math.random() > 0.5;
                        p.colors[idx] = isMagenta ? 1.0 : 0.0;
                        p.colors[idx+1] = isMagenta ? 0.0 : 1.0;
                        p.colors[idx+2] = 1.0;
                        
                        p.lifespans[p.count] = 1.0;
                        p.count++;
                    }
                };
                
                const triggerHeartExplosion = (x, y, z) => {
                    const p = particlesRef.current;
                    const count = 400;
                    for(let i = 0; i < count; i++) {
                        if (p.count >= p.maxParticles) break;
                        const idx = p.count * 3;
                        
                        const t = Math.random() * Math.PI * 2;
                        const s = 0.05 + Math.random() * 0.05;
                        const vx = 16 * Math.pow(Math.sin(t), 3) * s;
                        const vy = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * s;
                        
                        p.positions[idx] = x + (Math.random()-0.5)*0.3;
                        p.positions[idx+1] = y + (Math.random()-0.5)*0.3;
                        p.positions[idx+2] = z + (Math.random()-0.5)*0.3;
                        
                        p.velocities[idx] = vx * 0.5;
                        p.velocities[idx+1] = vy * 0.5;
                        p.velocities[idx+2] = (Math.random()-0.5)*0.05;
                        
                        p.colors[idx] = 1.0;
                        p.colors[idx+1] = 0.2;
                        p.colors[idx+2] = 0.4; // Crimson/Pink Heart Layer
                        
                        p.lifespans[p.count] = 2.0; // Last longer
                        p.count++;
                    }
                };

                const drawTrailParticle = (x, y, z) => {
                    const p = particlesRef.current;
                    for (let i = 0; i < 8; i++) {
                        if (p.count >= p.maxParticles) break;
                        const idx = p.count * 3;
                        
                        p.positions[idx] = x + (Math.random()-0.5)*0.2;
                        p.positions[idx+1] = y + (Math.random()-0.5)*0.2;
                        p.positions[idx+2] = z + (Math.random()-0.5)*0.1;
                        
                        p.velocities[idx] = (Math.random()-0.5)*0.02;
                        p.velocities[idx+1] = (Math.random()-0.5)*0.02;
                        p.velocities[idx+2] = (Math.random()-0.5)*0.02;
                        
                        p.colors[idx] = 0.0;
                        p.colors[idx+1] = 1.0;
                        p.colors[idx+2] = 1.0; // Cyan draw color
                        
                        p.lifespans[p.count] = 1.2;
                        p.count++;
                    }
                };

                const animate = () => {
                    reqAnimFrameRef.current = requestAnimationFrame(animate);
                    
                    framesRef.current++;
                    const now = performance.now();
                    if (now - lastTimeRef.current >= 1000) {
                        setMetrics({ fps: framesRef.current });
                        framesRef.current = 0;
                        lastTimeRef.current = now;
                    }

                    // Background Animation
                    if (bgGroupRef.current) {
                        bgGroupRef.current.children[1].position.z += 0.2; // Move road
                        bgGroupRef.current.children[2].position.z += 0.2; // Move line
                        if (bgGroupRef.current.children[1].position.z > 20) {
                            bgGroupRef.current.children[1].position.z = 0;
                            bgGroupRef.current.children[2].position.z = 0;
                        }
                    }
                    
                    const car = objectsRef.current[0];
                    if (car) {
                        const targetPos = targetsRef.current.positions[0].clone();
                        // Add base offset so road is below
                        targetPos.y += -2.5; 
                        
                        // Limit minimum height to act like road
                        if (targetPos.y < -2.1) targetPos.y = -2.1;
                        
                        // Calculate movement delta for tilting/wheels
                        const dx = targetPos.x - car.position.x;
                        const dz = 0.2; // Simulated forward movement
                        
                        car.position.lerp(targetPos, 0.1);
                        
                        // Bank the car when turning
                        car.rotation.z = THREE.MathUtils.lerp(car.rotation.z, dx * 0.15, 0.1);
                        
                        // Tilt car up when flying
                        const isFlying = car.position.y > -1.8;
                        car.rotation.x = THREE.MathUtils.lerp(car.rotation.x, isFlying ? 0.15 : 0, 0.1);

                        // Spin wheels
                        if (objectsRef.current.wheels && objectsRef.current.wheels.length > 0) {
                            objectsRef.current.wheels.forEach(w => {
                                w.rotation.x += dz;
                                // Subtle turn logic based on dx
                                w.rotation.y = dx * 0.1;
                            });
                        }
                        
                        const s = targetsRef.current.scale;
                        car.scale.lerp(new THREE.Vector3(s, s, s), 0.15);
                    }
                    
                    const p = particlesRef.current;
                    if (p.count > 0) {
                        let aliveCount = 0;
                        for (let i = 0; i < p.count; i++) {
                            if (p.lifespans[i] <= 0) continue;
                            const idx = i * 3;
                            
                            p.velocities[idx] *= 0.98;
                            p.velocities[idx+1] *= 0.98;
                            p.velocities[idx+2] *= 0.98;
                            p.velocities[idx+1] -= 0.002; // Gravitate
                            
                            p.positions[idx] += p.velocities[idx];
                            p.positions[idx+1] += p.velocities[idx+1];
                            p.positions[idx+2] += p.velocities[idx+2];
                            
                            p.lifespans[i] -= 0.015;
                            
                            if (p.lifespans[i] > 0) {
                                if (i !== aliveCount) {
                                    const aIdx = aliveCount * 3;
                                    p.positions[aIdx] = p.positions[idx]; p.positions[aIdx+1] = p.positions[idx+1]; p.positions[aIdx+2] = p.positions[idx+2];
                                    p.velocities[aIdx] = p.velocities[idx]; p.velocities[aIdx+1] = p.velocities[idx+1]; p.velocities[aIdx+2] = p.velocities[idx+2];
                                    p.colors[aIdx] = p.colors[idx]; p.colors[aIdx+1] = p.colors[idx+1]; p.colors[aIdx+2] = p.colors[idx+2];
                                    p.lifespans[aliveCount] = p.lifespans[i];
                                }
                                aliveCount++;
                            }
                        }
                        p.count = aliveCount;
                        p.mesh.geometry.setDrawRange(0, p.count);
                        p.mesh.geometry.attributes.position.needsUpdate = true;
                        p.mesh.geometry.attributes.color.needsUpdate = true;
                    }
                    
                    renderer.render(scene, camera);
                };
                animate();

                function onWindowResize() {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                }
                window.addEventListener('resize', onWindowResize);

                // MediaPipe Initialization
                const hands = new window.Hands({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                });
                
                hands.setOptions({
                    maxNumHands: 2, // Allow 2 hands for full gesture/heart recognition
                    modelComplexity: 1,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });
                
                hands.onResults((results) => {
                    const ctx = canvasRef.current.getContext('2d');
                    ctx.save();
                    ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
                    
                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        setHandsCount(results.multiHandLandmarks.length);
                        
                        // Render both sets of landmarks on screen
                        for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                            const landmarks = results.multiHandLandmarks[i];
                            const color = i === 0 ? '#ff00ff' : '#00ffff'; // First hand pink, second hand cyan
                            window.drawConnectors(ctx, landmarks, window.HAND_CONNECTIONS, {color: color, lineWidth: 3});
                            window.drawLandmarks(ctx, landmarks, {color: '#ffffff', lineWidth: 1, radius: 3});
                        }
                        
                        const gesture = detectGesture(results.multiHandLandmarks);
                        
                        if (gesture !== gestureStateRef.current) {
                            gestureStateRef.current = gesture;
                            setLocalGesture(gesture);
                        }
                        
                        let worldX = 0, worldY = 0;
                        const targets = targetsRef.current;

                        if (gesture === GESTURES.HEART && results.multiHandLandmarks.length === 2) {
                            const h1 = results.multiHandLandmarks[0];
                            const h2 = results.multiHandLandmarks[1];
                            const centerX = (h1[4].x + h2[4].x) / 2;
                            const centerY = (h1[4].y + h2[4].y) / 2;
                            worldX = (centerX - 0.5) * -10;
                            worldY = -(centerY - 0.5) * 10;
                        } else {
                            const landmarks = results.multiHandLandmarks[0];
                            // If pointing/drawing, bind to index finger tip. Otherwise, center of hand.
                            if (gesture === GESTURES.POINTING) {
                                worldX = (landmarks[8].x - 0.5) * -10;
                                worldY = -(landmarks[8].y - 0.5) * 10;
                            } else {
                                worldX = (landmarks[9].x - 0.5) * -10;
                                worldY = -(landmarks[9].y - 0.5) * 10;
                            }
                        }
                        
                        targets.handPos.set(worldX, worldY, 0);

                        // Gesture Actions
                        if (gesture === GESTURES.OPEN_PALM || gesture === GESTURES.FIST || gesture === GESTURES.POINTING) {
                            // Car follows hand
                            targets.positions[0].set(worldX, worldY, 0);
                        } else {
                            // Drift back to center
                            targets.positions[0].set(0, 0, 0);
                        }
                        
                        if (gesture === GESTURES.FIST) {
                            targets.scale = 0.5; // Squeeze car
                        } else {
                            targets.scale = 1.0;
                        }
                        
                        if (gesture === GESTURES.POINTING) {
                            drawTrailParticle(worldX, worldY, 0);
                        }
                        
                        if (gesture === GESTURES.POINTING) {
                            // Leave a trail
                            drawTrailParticle(worldX, worldY, 0);
                            // Avoid immediately snapping objects, just let them be, pointing is drawing now.
                        }
                        
                        // Explode triggers (only on valid state change)
                        if (lastValidGestureRef.current !== gesture) {
                            if (gesture === GESTURES.THUMBS_UP || gesture === GESTURES.PEACE) {
                                triggerExplosion(worldX, worldY, 0);
                            } else if (gesture === GESTURES.HEART) {
                                triggerHeartExplosion(worldX, worldY, 0);
                            }
                            lastValidGestureRef.current = gesture;
                        }
                    } else {
                        setHandsCount(0);
                        if (gestureStateRef.current !== GESTURES.NONE) {
                            gestureStateRef.current = GESTURES.NONE;
                            setLocalGesture(GESTURES.NONE);
                        }
                        lastValidGestureRef.current = GESTURES.NONE;
                    }
                    ctx.restore();
                });

                if (videoRef.current) {
                    const cameraFeed = new window.Camera(videoRef.current, {
                        onFrame: async () => {
                            await hands.send({image: videoRef.current});
                        },
                        width: 640,
                        height: 480
                    });
                    
                    cameraFeed.start().then(() => {
                        setLoading(false);
                    }).catch(err => {
                        setLoading(false);
                        console.error("Camera access failed", err);
                        alert("Camera access is required for hand tracking.");
                    });
                }

                return () => {
                    if (reqAnimFrameRef.current) cancelAnimationFrame(reqAnimFrameRef.current);
                    window.removeEventListener('resize', onWindowResize);
                    hands.close();
                };
            }, []);

            return (
                <div className="w-full h-screen overflow-hidden text-white relative">
                    {loading && (
                        <div className="loading-screen">
                            <div className="spinner"></div>
                            <h2 className="text-xl font-bold text-fuchsia-400">Loading AI Models & Camera...</h2>
                        </div>
                    )}
                    
                    <div id="webgl-container"></div>
                    
                    <div className="absolute top-4 left-4 glass-panel p-5 flex flex-col gap-4 z-10 w-80">
                        <h1 className="text-xl font-bold text-fuchsia-400 uppercase tracking-widest border-b border-fuchsia-400 border-opacity-30 pb-2">
                            Aura Hands 3D
                        </h1>
                        
                        <div className="flex flex-col gap-2 text-sm font-semibold">
                            <div className="flex justify-between items-center">
                                <span className="text-gray-400">Hands Tracked:</span>
                                <span className={handsCount > 0 ? "text-cyan-400" : "text-red-400"}>
                                    {handsCount} {handsCount === 1 ? 'Hand' : handsCount === 2 ? 'Hands (2H Mode Active)' : '(Not Detected)'}
                                </span>
                            </div>
                            <div className="flex justify-between items-center">
                                <span className="text-gray-400">Gesture:</span>
                                <span className="text-fuchsia-400 text-base uppercase tracking-wider">
                                    {localGesture}
                                </span>
                            </div>
                            <div className="flex justify-between items-center">
                                <span className="text-gray-400">FPS:</span>
                                <span className="text-gray-300">{metrics.fps}</span>
                            </div>
                        </div>
                        
                        <div className="relative mt-2">
                            <div className="video-container">
                                <video ref={videoRef} className="video-feed" autoPlay playsInline muted></video>
                                <canvas ref={canvasRef} className="canvas-overlay" width="640" height="480"></canvas>
                            </div>
                        </div>
                        
                        <div className="mt-2 text-xs text-gray-400 flex flex-col gap-1.5 p-2 bg-black bg-opacity-30 rounded-md">
                            <div className="flex items-start gap-2">
                                <strong className="text-pink-400 w-24 shrink-0">Two-Hand Heart:</strong> 
                                <span>Giant Heart Explosion</span>
                            </div>
                            <div className="flex items-start gap-2">
                                <strong className="text-cyan-300 w-24 shrink-0">Open Palm / Point:</strong> 
                                <span>Drive the Car</span>
                            </div>
                            <div className="flex items-start gap-2">
                                <strong className="text-cyan-300 w-24 shrink-0">Move Hand Up:</strong> 
                                <span>Make the Car Fly</span>
                            </div>
                            <div className="flex items-start gap-2">
                                <strong className="text-cyan-300 w-24 shrink-0">Fist:</strong> 
                                <span>Squeeze/Scale Car Down</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
